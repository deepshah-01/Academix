<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks - Academix</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/bookmarks.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <div id="sidebar-mount"></div>

    <!-- Main Content -->

    <main class="main-content">

        <h1>🔖 My Bookmarks</h1>

        <!-- Search -->

        <div class="bookmark-controls">
        
            <input type="text" id="searchBookmark" placeholder="Search bookmarks...">
        
            <select id="sortBookmarks" onchange="setSortOrder(this.value)">
        
                <option value="NEWEST">
                    Newest First
                </option>
        
                <option value="OLDEST">
                    Oldest First
                </option>
        
            </select>
        
        </div>

        <!-- Filter Buttons -->

        <div class="filter-buttons">

            <button class="filter-btn" data-type="ALL" onclick="setBookmarkFilter('ALL', this)">
                All
            </button>

            <button class="filter-btn" data-type="NOTES" onclick="setBookmarkFilter('NOTES', this)">
                📚 Notes
            </button>

            <button class="filter-btn" data-type="RESOURCES" onclick="setBookmarkFilter('RESOURCES', this)">
                📄 Resources
            </button>

        </div>

        <!-- Bookmark Cards -->

        <div id="bookmarkList">

        </div>

    </main>

    <script src="js/storage.js"></script>
    <script src="js/device-folder.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/bookmarks.js"></script>
    <script src="js/theme.js"></script>

</body>
</html>
