<form id="attendanceForm">

    <input
        type="text"
        id="subject"
        placeholder="Subject Name"
        required
    >

    <input
        type="number"
        id="conducted"
        placeholder="Lectures Conducted"
        required
    >

    <input
        type="number"
        id="attended"
        placeholder="Lectures Attended"
        required
    >

    <button type="submit">
        Add Attendance
    </button>

</form>

<div id="attendanceList"></div>
