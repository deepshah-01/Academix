<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Academix</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/attendance.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div id="sidebar-mount"></div>

<div class="attendance-container">

    <div class="page-header">
        <h1>📊 Attendance</h1>
    </div>

    <div class="attendance-card" id="singleSubject">

        <h2>Attendance Calculater</h2>

        <div class="input-group">
            <label>Required Attendance</label>
            <select id="requiredPercentage">
                <option value="75">75%</option>
                <option value="80">80%</option>
                <option value="85">85%</option>
                <option value="90">90%</option>
            </select>
        </div>

        <div class="input-group">
            <label>Present Classes</label>
            <input type="number" id="presentClasses">
        </div>

        <div class="input-group">
            <label>Total Classes</label>
            <input type="number" id="totalClasses">
        </div>

        <button class="calculate-btn" type="button">
            Calculate
        </button>

        <div class="result-box" id="resultBox" style="display:none;">
            <p id="currentAttendance"></p>
            <p id="bunkResult"></p>
        </div>

    </div>

</div>

<script src="js/storage.js"></script>
<script src="js/attendance.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
