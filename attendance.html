<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Academix</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/attendance.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<aside class="sidebar">
    <h2 class="logo">Academix</h2>

    <ul>
        <li><a href="dashboard.html">🏠Dashboard</a></li>
        <li class="active"><a href="attendance.html">📊 Attendance</a></li>
        <li><a href="notes.html">📚 Notes</a></li>
        <li><a href="resources.html">📄 Resources</a></li>
        <li><a href="bookmarks.html">🔖 Bookmarks</a></li>
        <li>
            <a href="search.html">
                🔍 Global Search
            </a>
        </li>
        <li><a href="profile.html">👤 Profile</a></li>
        <li onclick="logout()">🚪 Logout</li>
    </ul>
</aside>

<div class="attendance-container">

    <div class="page-header">
        <h1>📊 Attendance</h1>
    </div>

    <div class="attendance-card" id="singleSubject">

        <h2>Attendance Calculater</h2>

        <div class="input-group">
            <label>Required Attendance</label>
            <select id="requiredPercentage">
                <option value="75">75%</option>
                <option value="80">80%</option>
                <option value="85">85%</option>
                <option value="90">90%</option>
            </select>
        </div>

        <div class="input-group">
            <label>Present Classes</label>
            <input type="number" id="presentClasses">
        </div>

        <div class="input-group">
            <label>Total Classes</label>
            <input type="number" id="totalClasses">
        </div>

        <button class="calculate-btn" type="button">
            Calculate
        </button>

        <div class="result-box" id="resultBox" style="display:none;">
            <p id="currentAttendance"></p>
            <p id="bunkResult"></p>
        </div>

    </div>

</div>

<script src="js/attendance.js"></script>
<script src="js/theme.js"></script>

</body>
</html>
