<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Profile - Academix</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    >

    <link
        rel="stylesheet"
        href="css/sidebar.css"
    >

    <link
        rel="stylesheet"
        href="css/profile.css"
    >
    <link
        rel="stylesheet"
        href="css/responsive.css"
    >

</head>
<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2 class="logo">

            Academix

        </h2>

        <ul>

            <li>

                <a href="dashboard.html">

                    🏠 Dashboard

                </a>

            </li>

            <li>

                <a href="attendance.html">

                    📊 Attendance

                </a>

            </li>

            <li>

                <a href="notes.html">

                    📚 Notes

                </a>

            </li>

            <li>

                <a href="resources.html">

                    📄 Resources

                </a>

            </li>

            <li>

                <a href="bookmarks.html">

                    🔖 Bookmarks

                </a>

            </li>

            <li>
                <a href="search.html">
                    🔍 Global Search
                </a>
            </li>

            <li class="active">

                <a href="profile.html">

                    👤 Profile

                </a>

            </li>

            <li onclick="logout()">

                🚪 Logout

            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <h1>

            👤 My Profile

        </h1>

        <div class="profile-container">

            <div class="profile-card">

                <h2 id="userName">

                    User

                </h2>

                <p id="userEmail">

                    Email

                </p>

            </div>

            <div class="stats-grid">

                <div class="stat-card">

                    <h3>

                        📚 Notes

                    </h3>

                    <p id="totalNotes">

                        0

                    </p>

                </div>

                <div class="stat-card">

                    <h3>

                        📄 Resources

                    </h3>

                    <p id="totalResources">

                        0

                    </p>

                </div>

                <div class="stat-card">

                    <h3>

                        🔖 Bookmarks

                    </h3>

                    <p id="totalBookmarks">

                        0

                    </p>

                </div>

            </div>

            <button
                id="themeBtn"
            >

                🌙 Dark Mode

            </button>

        </div>

    </main>

    <script src="js/storage.js"></script>

    <script src="js/auth.js"></script>

    <script src="js/profile.js"></script>
    <script src="js/theme.js"></script>

</body>
</html>
