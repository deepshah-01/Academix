<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources - Academix</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/resources.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <div id="sidebar-mount"></div>

    <!-- Main Content -->

    <main class="main-content">

        <h1>📄 Study Resources</h1>

        <!-- Add Resource Form -->

        <form id="resourceForm">

            <input
                type="text"
                id="title"
                placeholder="Resource Title"
                required
            >

            <div class="subject-manager">
                <label for="subject">Subject Folder</label>
                <select id="subject" required></select>

                <div class="new-subject-row">
                    <input
                        type="text"
                        id="newSubjectInput"
                        placeholder="Add subject once, then select it"
                    >
                    <button id="addSubjectBtn" type="button">
                        Add Subject
                    </button>
                </div>
            </div>


            <label>Resource Type</label>
            
            <select id="type">
            
                <option value="PDF">📄 PDF Notes</option>
            
                <option value="PPT">📊 PPT</option>
            
                <option value="VIDEO">🎥 Video Lecture</option>
            
                <option value="PYQ">📝 Previous Year Questions</option>
            
                <option value="LINK">🔗 Link</option>
            
                <option value="BOOK">📚 Book</option>
            
            </select>

            <input
                type="url"
                id="url"
                placeholder="Paste Resource Link (optional if uploading a file)"
            >

            <div class="folder-manager">
                <button id="connectFolderBtn" type="button">
                    Connect Device Folder
                </button>
                <p id="folderStatus" class="form-hint">
                    For PDFs/PPTs/files, connect a folder first. Academix will create
                    Academix / Subject folders when your browser supports it.
                </p>
            </div>

            <label for="fileUpload">Or upload a local file</label>

            <input
                type="file"
                id="fileUpload"
                accept=".pdf,.ppt,.pptx,.doc,.docx,.txt,.png,.jpg,.jpeg,.gif,.mp4,.webm,.mp3,.wav"
            >

            <p class="form-hint">
                Links stay in the app. Uploaded files are saved to your connected device folder, not inside localStorage.
            </p>

            <p id="fileName" class="file-name"></p>

            <input
                type="text"
                id="tags"
                placeholder="Tags (comma separated)"
            >

            <button type="submit">

                Add Resource

            </button>

        </form>


        <!-- Search -->

        <input
            type="text"
            id="searchResource"
            placeholder="🔍Search resources..."
        >

        <section class="restore-panel">
            <div class="restore-header">
                <h2>Last Deleted Resources</h2>
                <span>Max 5</span>
            </div>
            <div id="deletedResourcesList" class="restore-list"></div>
        </section>

        <div class="filter-buttons">
            <button class="filter-btn" data-type="ALL" onclick="setFilter('ALL', this)">
                All
            </button>

            <button class="filter-btn" data-type="PDF" onclick="setFilter('PDF', this)">
                📄 PDF
            </button>

            <button class="filter-btn" data-type="PPT" onclick="setFilter('PPT', this)">
                📊 PPT
            </button>

            <button class="filter-btn" data-type="VIDEO" onclick="setFilter('VIDEO', this)">
                🎥 Video
            </button>

            <button class="filter-btn" data-type="PYQ" onclick="setFilter('PYQ', this)">
                📝 PYQ
            </button>

            <button class="filter-btn" data-type="LINK" onclick="setFilter('LINK', this)">
                🔗 Link
            </button>

            <button class="filter-btn" data-type="BOOK" onclick="setFilter('BOOK', this)">
                📚 Book
            </button>

        </div>
        <!-- Resources List -->

        <div id="resourceList">

        </div>

    </main>

    <script src="js/storage.js"></script>
    <script src="js/device-folder.js"></script>
    <script src="js/resources.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/theme.js"></script>

</body>
</html>
