<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - Academix</title>

<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="container">

    <div class="left-panel">

        <h1>Academix</h1>

        <h2>Your Academic Journey, Organized.</h2>

        <p>
            Manage notes, attendance, PYQs and resources
            from one unified student dashboard.
        </p>

    </div>

    <div class="right-panel">

        <div class="form-box">

            <h2>Create Account</h2>

            <form id="signupForm">

                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <input type="text" id="university" placeholder="University" required>
                <input type="text" id="course" placeholder="Course" required>

                <select id="year" required>
                    <option value="">Select Year</option>
                    <option>1st Year</option>
                    <option>2nd Year</option>
                    <option>3rd Year</option>
                    <option>4th Year</option>
                </select>

                <button type="submit">
                    Create Account
                </button>

            </form>

            <p class="login-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </div>

    </div>

</div>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
